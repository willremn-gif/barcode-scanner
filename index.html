<!DOCTYPE html>
<html>
<head>
<meta name="viewport" content="width=device-width, initial-scale=1">

<script src="https://cdnjs.cloudflare.com/ajax/libs/html5-qrcode/2.3.8/html5-qrcode.min.js"></script>

<style>
body {
  font-family: Arial;
  text-align: center;
  padding: 15px;
  background: #f4f6f8;
}

h2 {
  font-size: 22px;
}

#reader {
  width: 100%;
  max-width: 350px;
  margin: auto;
}

button {
  padding: 14px;
  font-size: 16px;
  margin-top: 10px;
  width: 90%;
  background: #1976d2;
  color: white;
  border: none;
  border-radius: 8px;
}

#result {
  margin-top: 20px;
  font-size: 18px;
  font-weight: bold;
}
</style>
</head>

<body>

<h2>WORKING BARCODE SCANNER</h2>

<div id="reader"></div>

<button onclick="startScan()">START SCAN</button>

<p id="result">Ready</p>

<script>

let scanner;

// 🔴 PUT YOUR APPS SCRIPT /exec URL HERE
const API_URL = "https://script.google.com/macros/s/AKfycbwSPZ0FJjwH3ebEvRZ8aIFTcjwl8f8ax82o3e1Q3KCdu25OCIVp-jVSgnYlnIMW75xz/exec";

function startScan() {

  const result = document.getElementById("result");
  result.innerHTML = "Starting camera...";

  scanner = new Html5Qrcode("reader");

  Html5Qrcode.getCameras().then(devices => {

    if (!devices || devices.length === 0) {
      result.innerHTML = "No camera found ❌";
      return;
    }

    const cameraId =
      devices.find(d => d.label && d.label.toLowerCase().includes("back"))
      ?.id || devices[0].id;

    scanner.start(
      cameraId,
      { fps: 10, qrbox: 250 },
      async (decodedText) => {

        const res = await fetch(API_URL + "?barcode=" + encodeURIComponent(decodedText));
const data = await res.json();

if (data.found) {
  result.innerHTML =
    "FOUND ✔<br>" +
    "Barcode: " + decodedText + "<br>" +
    "Column J: " + data.colJ + "<br>" +
    "Column O: " + data.colO;
} else {
  result.innerHTML = "NOT FOUND ❌";
}

      }
    );

  });

}

</script>

</body>
</html>
